<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Choose the Correct Picture!</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primary-bg: #e0f2fe;
            --card-bg: #ffffff;
            --text-main: #1e293b;
            --correct-color: #22c55e;
            --wrong-color: #ef4444;
            --bonus-color: #eab308;
            --accent-blue: #3b82f6;
        }

        * {
            box-sizing: border-box;
            user-select: none;
            -webkit-user-select: none;
            touch-action: manipulation;
        }

        body {
            font-family: 'Fredoka', sans-serif;
            background: url('https://images.template.net/567225/Pastel-Cute-Background-Template-edit-online.webp') no-repeat center center fixed;
            background-size: cover;
            margin: 0;
            padding: 10px;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            overflow-x: hidden;
        }

        /* --- Layout Container --- */
        #game-container {
            width: 100%;
            max-width: 950px;
            background: rgba(255, 255, 255, 0.75); 
            backdrop-filter: blur(12px);
            border: 6px solid #bae6fd;
            border-radius: 32px;
            padding: 24px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
            position: relative;
            text-align: center;
        }

        /* --- Screen Views Control --- */
        .screen { display: none; }
        .screen.active { display: block; }

        /* --- Welcome / Start Screen Layout --- */
        #start-screen h1 {
            font-size: 4rem;
            color: #1e3a8a;
            text-shadow: 3px 3px 0px #93c5fd;
            margin-bottom: 10px;
        }

        .game-desc {
            font-size: 1.5rem;
            color: #475569;
            margin-bottom: 35px;
        }

        .settings-card {
            background: #ffffff;
            border: 4px solid #bae6fd;
            border-radius: 24px;
            padding: 20px;
            max-width: 500px;
            margin: 0 auto 35px auto;
            box-shadow: 0 8px 16px rgba(0,0,0,0.04);
        }

        .settings-card h3 {
            margin-top: 0;
            color: #1e40af;
            font-size: 1.3rem;
            margin-bottom: 15px;
        }

        .timer-options {
            display: flex;
            gap: 10px;
            justify-content: center;
            flex-wrap: wrap;
        }

        .timer-btn {
            background: #f1f5f9;
            border: 3px solid #cbd5e1;
            padding: 12px 24px;
            font-family: 'Fredoka', sans-serif;
            font-size: 1.2rem;
            font-weight: 600;
            border-radius: 16px;
            cursor: pointer;
            transition: all 0.1s ease;
        }

        .timer-btn.selected {
            background: #dbeafe;
            border-color: #3b82f6;
            color: #1e40af;
            transform: scale(1.05);
        }

        .btn-start-game {
            background: linear-gradient(135deg, #10b981 0%, #047857 100%);
            color: white;
            border: none;
            font-family: 'Fredoka', sans-serif;
            font-size: 2rem;
            font-weight: 600;
            padding: 15px 60px;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 8px 0px #065f46;
            transition: all 0.1s ease;
        }

        .btn-start-game:active {
            transform: translateY(6px);
            box-shadow: 0 2px 0px #065f46;
        }

        /* --- Top Dashboard --- */
        .header-dashboard {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            gap: 10px;
            flex-wrap: wrap;
        }

        .stats-badge {
            background: var(--card-bg);
            padding: 10px 20px;
            border-radius: 20px;
            font-size: 1.25rem;
            font-weight: 600;
            color: var(--text-main);
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            border: 3px solid #e2e8f0;
        }

        #score-display {
            border-color: #fde047;
            background: #fef08a;
            color: #713f12;
        }

        /* --- Teacher Toolbar --- */
        .controls-toolbar {
            display: flex;
            gap: 8px;
            justify-content: center;
        }

        .btn-tool {
            background: white;
            border: 3px solid #cbd5e1;
            padding: 8px 14px;
            border-radius: 14px;
            cursor: pointer;
            font-family: 'Fredoka', sans-serif;
            font-weight: 600;
            font-size: 0.95rem;
            display: flex;
            align-items: center;
            gap: 6px;
            transition: all 0.2s ease;
        }

        .btn-tool:active, .btn-tool.active {
            background: #e2e8f0;
            transform: scale(0.95);
        }

        /* --- Timer Bar --- */
        .timer-container {
            width: 100%;
            background: #e2e8f0;
            height: 20px;
            border-radius: 10px;
            margin-bottom: 25px;
            overflow: hidden;
            border: 2px solid #cbd5e1;
            position: relative;
        }

        .timer-bar {
            height: 100%;
            width: 100%;
            background: linear-gradient(90deg, #3b82f6, #60a5fa);
            border-radius: 8px;
            transition: width 0.1s linear;
        }

        /* --- Main Target Word --- */
        .target-word-box {
            margin: 15px 0 30px 0;
        }

        .target-word {
            font-size: 4.5rem;
            font-weight: 700;
            letter-spacing: 2px;
            color: #1e3a8a;
            text-transform: lowercase;
            text-shadow: 2px 2px 0px #93c5fd;
            margin: 0;
            animation: bounce 2s infinite ease-in-out;
        }

        /* --- Options Grid --- */
        .options-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 24px;
            margin-bottom: 25px;
        }

        .option-card {
            background: var(--card-bg);
            border: 6px solid #cbd5e1;
            border-radius: 28px;
            padding: 20px;
            cursor: pointer;
            transition: transform 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275), box-shadow 0.2s;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 240px;
            position: relative;
            touch-action: none;
        }

        .option-card * {
            pointer-events: none;
        }

        .option-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 12px 20px rgba(0,0,0,0.08);
        }

        .option-card:active {
            transform: scale(0.96);
        }

        .option-image {
            width: 100%;
            max-width: 170px;
            height: 170px;
            object-fit: contain;
            filter: drop-shadow(0px 6px 8px rgba(0,0,0,0.1));
        }

        /* --- Feedback State Animations --- */
        .option-card.correct {
            border-color: var(--correct-color);
            background: #f0fdf4;
            animation: glow-correct 0.6s infinite alternate;
        }

        .option-card.wrong {
            border-color: var(--wrong-color);
            background: #fef2f2;
            animation: shake 0.4s ease-in-out;
        }

        /* --- Feedback Banner Alerts --- */
        #feedback-banner {
            font-size: 2rem;
            font-weight: 700;
            height: 50px;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .text-correct { color: var(--correct-color); animation: popUp 0.3s forwards; }
        .text-wrong { color: var(--wrong-color); animation: popUp 0.3s forwards; }
        .text-bonus { color: var(--bonus-color); animation: lightning 0.5s infinite alternate; font-size: 2.2rem; }

        /* --- Footer Navigation --- */
        .footer-action {
            display: flex;
            justify-content: center;
            height: 60px;
        }

        .btn-next {
            background: linear-gradient(135deg, #3b82f6 0%, #1d4ed8 100%);
            color: white;
            border: none;
            font-family: 'Fredoka', sans-serif;
            font-size: 1.6rem;
            font-weight: 600;
            padding: 12px 45px;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 6px 0px #1e40af;
            transition: all 0.1s ease;
            display: none;
            align-items: center;
        }

        .btn-next:active {
            transform: translateY(4px);
            box-shadow: 0 2px 0px #1e40af;
        }

        /* --- Ending View Layout --- */
        #end-screen h2 {
            font-size: 3.5rem;
            color: #1e3a8a;
            margin-top: 10px;
        }

        .final-score-pill {
            font-size: 2.5rem;
            background: #fef08a;
            border: 4px dashed #eab308;
            padding: 15px 40px;
            border-radius: 30px;
            display: inline-block;
            margin: 20px 0;
            color: #713f12;
            font-weight: 700;
        }

        #motivational-msg {
            font-size: 2rem;
            color: #475569;
            margin-bottom: 30px;
            font-weight: 600;
        }

        .btn-restart {
            background: linear-gradient(135deg, #3b82f6 0%, #1d4ed8 100%);
            color: white;
            border: none;
            font-family: 'Fredoka', sans-serif;
            font-size: 1.6rem;
            font-weight: 600;
            padding: 12px 50px;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 6px 0px #1e40af;
        }

        .btn-restart:active {
            transform: translateY(4px);
            box-shadow: 0 2px 0px #1e40af;
        }

        /* --- Animations CSS --- */
        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-8px); }
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            20%, 60% { transform: translateX(-10px); }
            40%, 80% { transform: translateX(10px); }
        }

        @keyframes glow-correct {
            from { box-shadow: 0 0 10px rgba(34, 197, 94, 0.2); }
            to { box-shadow: 0 0 25px rgba(34, 197, 94, 0.8); }
        }

        @keyframes popUp {
            0% { transform: scale(0.5); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }

        @keyframes lightning {
            0% { transform: scale(1); filter: drop-shadow(0 0 2px #fde047); }
            100% { transform: scale(1.08); filter: drop-shadow(0 0 15px #eab308); }
        }

        /* Responsive Breakpoints for Tablets and Screens */
        @media (max-width: 768px) {
            .options-grid { grid-template-columns: 1fr; gap: 16px; }
            .option-card { min-height: 140px; flex-direction: row; gap: 20px; padding: 15px 30px; }
            .option-image { max-width: 100px; height: 100px; }
            .target-word { font-size: 3rem; }
            #game-container { padding: 16px; border-width: 4px; }
            .header-dashboard { justify-content: center; }
            #start-screen h1 { font-size: 2.5rem; }
        }
    </style>
</head>
<body>

    <div id="game-container">
        
        <div id="start-screen" class="screen active">
            <h1>Choose the Correct Picture!</h1>
            <p class="game-desc">Read the target word and tap the matching object before time runs out!</p>
            
            <div class="settings-card">
                <h3>⏱️ Answer Time Limit Settings</h3>
                <div class="timer-options">
                    <button class="timer-btn selected" onclick="setAnswerLimit(5000, this)">5 Seconds</button>
                    <button class="timer-btn" onclick="setAnswerLimit(10000, this)">10 Seconds</button>
                    <button class="timer-btn" onclick="setAnswerLimit(15000, this)">15 Seconds</button>
                    <button class="timer-btn" onclick="setAnswerLimit(20000, this)">20 Seconds</button>
                </div>
            </div>

            <button class="btn-start-game" onclick="startGame()">Start Game 🚀</button>
        </div>
        
        <div id="play-screen" class="screen">
            <div class="header-dashboard">
                <div style="display: flex; gap: 10px;">
                    <div id="progress-display" class="stats-badge">Question 1/8</div>
                    <div id="score-display" class="stats-badge">Score: 0</div>
                </div>
                
                <div class="controls-toolbar">
                    <button class="btn-tool" onclick="toggleMute()" id="mute-btn" title="Toggle Sound">🔊 Sound</button>
                    <button class="btn-tool" onclick="showHomeScreen()" title="Return to Menu">🏠 Home</button>
                    <button class="btn-tool" onclick="resetGame()" title="Reset Session">🔄 Reset</button>
                    <button class="btn-tool" onclick="toggleFullscreen()" title="Fullscreen Mode">📺 Fullscreen</button>
                </div>
            </div>

            <div class="timer-container">
                <div id="timer-bar" class="timer-bar"></div>
            </div>

            <div class="target-word-box">
                <h1 id="target-word-display" class="target-word">loading...</h1>
            </div>

            <div class="options-grid" id="options-container">
            </div>

            <div id="feedback-banner"></div>

            <div class="footer-action">
                <button id="next-btn" class="btn-next" onclick="nextQuestion()">Next Question ➜</button>
            </div>
        </div>

        <div id="end-screen" class="screen">
            <h2>Game Complete!</h2>
            <div>
                <div class="final-score-pill" id="final-score">0 Points</div>
            </div>
            <p id="motivational-msg">Great job!</p>
            <button class="btn-restart" onclick="showHomeScreen()">Main Menu 🏠</button>
        </div>

    </div>

    <script>
        let audioCtx = null;
        let isMuted = false;
        let bgAudioElement = null;

        const vocabularyData = [
            { word: "glasses", url: "https://www.shutterstock.com/image-vector/pair-eyeglasses-red-frame-illustration-260nw-1773729677.jpg", distUrls: ["https://t3.ftcdn.net/jpg/05/16/32/90/360_F_516329057_YlhC80AA1CyDUl63SX53x3L9kjrKtJGw.jpg", "https://png.pngtree.com/png-vector/20240913/ourmid/pngtree-cartoon-shoes-png-image_12819554.png"] },
            { word: "lunchbox", url: "https://img.magnific.com/free-photo/healthy-lunchbox-school_123827-36399.jpg?semt=ais_hybrid&w=740&q=80", distUrls: ["https://t3.ftcdn.net/jpg/05/16/32/90/360_F_516329057_YlhC80AA1CyDUl63SX53x3L9kjrKtJGw.jpg", "https://img.magnific.com/premium-vector/baseball-cap-design-iconic-headwear-with-timeless-style_579306-34162.jpg?semt=ais_hybrid&w=740&q=80"] },
            { word: "umbrella", url: "https://i.pinimg.com/736x/cb/6a/92/cb6a9290c50be963ac0ccc32d69a5710.jpg", distUrls: ["https://static.vecteezy.com/system/resources/thumbnails/068/440/200/small/cartoon-blue-water-bottle-illustration-on-transparent-background-vector.jpg", "https://img.magnific.com/premium-vector/baseball-cap-design-iconic-headwear-with-timeless-style_579306-34162.jpg?semt=ais_hybrid&w=740&q=80"] },
            { word: "backpack", url: "https://t3.ftcdn.net/jpg/05/16/32/90/360_F_516329057_YlhC80AA1CyDUl63SX53x3L9kjrKtJGw.jpg", distUrls: ["https://img.magnific.com/free-photo/healthy-lunchbox-school_123827-36399.jpg?semt=ais_hybrid&w=740&q=80", "https://img3.shop2000.com.tw/100004/p92/55129004-1o.jpg"] },
            { word: "water bottle", url: "https://static.vecteezy.com/system/resources/thumbnails/068/440/200/small/cartoon-blue-water-bottle-illustration-on-transparent-background-vector.jpg", distUrls: ["https://i.pinimg.com/736x/cb/6a/92/cb6a9290c50be963ac0ccc32d69a5710.jpg", "https://www.shutterstock.com/image-vector/pair-eyeglasses-red-frame-illustration-260nw-1773729677.jpg"] },
            { word: "cap", url: "https://img.magnific.com/premium-vector/baseball-cap-design-iconic-headwear-with-timeless-style_579306-34162.jpg?semt=ais_hybrid&w=740&q=80", distUrls: ["https://png.pngtree.com/png-vector/20240913/ourmid/pngtree-cartoon-shoes-png-image_12819554.png", "https://t3.ftcdn.net/jpg/05/16/32/90/360_F_516329057_YlhC80AA1CyDUl63SX53x3L9kjrKtJGw.jpg"] },
            { word: "workbook", url: "https://img3.shop2000.com.tw/100004/p92/55129004-1o.jpg", distUrls: ["https://img.magnific.com/free-photo/healthy-lunchbox-school_123827-36399.jpg?semt=ais_hybrid&w=740&q=80", "https://www.shutterstock.com/image-vector/pair-eyeglasses-red-frame-illustration-260nw-1773729677.jpg"] },
            { word: "shoes", url: "https://png.pngtree.com/png-vector/20240913/ourmid/pngtree-cartoon-shoes-png-image_12819554.png", distUrls: ["https://www.shutterstock.com/image-vector/pair-eyeglasses-red-frame-illustration-260nw-1773729677.jpg", "https://img.magnific.com/premium-vector/baseball-cap-design-iconic-headwear-with-timeless-style_579306-34162.jpg?semt=ais_hybrid&w=740&q=80"] }
        ];

        let currentQuestions = [];
        let currentIndex = 0;
        let currentScore = 0;
        let answerTimerInstance = null;
        let hasAnswered = false;
        
        let totalAnswerTimeLimitMs = 5000; 
        const fixedSpeedBonusLimitMs = 3000; 
        let remainingTimeMs = 0;
        let elapsedQuestionTimeMs = 0;

        function setAnswerLimit(ms, element) {
            totalAnswerTimeLimitMs = ms;
            document.querySelectorAll('.timer-btn').forEach(btn => btn.classList.remove('selected'));
            element.classList.add('selected');
            if(audioCtx) playSynthSound(440, 'sine', 0.1); 
        }

        function showHomeScreen() {
            clearInterval(answerTimerInstance);
            stopBackgroundAudio();
            document.getElementById('play-screen').classList.remove('active');
            document.getElementById('end-screen').classList.remove('active');
            document.getElementById('start-screen').classList.add('active');
        }

        function startGame() {
            if (!audioCtx) {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            }
            if (audioCtx.state === 'suspended') {
                audioCtx.resume();
            }

            document.getElementById('start-screen').classList.remove('active');
            document.getElementById('play-screen').classList.add('active');
            
            startBackgroundAudio();
            initGame();
        }

        function initGame() {
            currentQuestions = [...vocabularyData].sort(() => Math.random() - 0.5);
            currentIndex = 0;
            currentScore = 0;
            hasAnswered = false;
            
            updateScoreboardView();
            loadQuestion();
        }

        function loadQuestion() {
            hasAnswered = false;
            elapsedQuestionTimeMs = 0;
            document.getElementById('next-btn').style.display = 'none';
            document.getElementById('feedback-banner').innerHTML = '';
            
            let item = currentQuestions[currentIndex];
            document.getElementById('target-word-display').innerText = item.word;
            document.getElementById('progress-display').innerText = `Question ${currentIndex + 1} of ${currentQuestions.length}`;
            
            let choices = [
                { imgUrl: item.url, isCorrect: true },
                { imgUrl: item.distUrls[0], isCorrect: false },
                { imgUrl: item.distUrls[1], isCorrect: false }
            ];
            
            choices.sort(() => Math.random() - 0.5);

            const grid = document.getElementById('options-container');
            grid.innerHTML = '';

            choices.forEach(choice => {
                const card = document.createElement('div');
                card.className = 'option-card';
                card.dataset.correct = choice.isCorrect;
                card.addEventListener('pointerdown', handleSelection);

                card.innerHTML = `<img src="${choice.imgUrl}" class="option-image" alt="vocabulary option">`;
                grid.appendChild(card);
            });

            startAnswerCountdown();
        }

        function startAnswerCountdown() {
            clearInterval(answerTimerInstance);
            const bar = document.getElementById('timer-bar');
            bar.style.width = '100%';
            bar.style.background = 'linear-gradient(90deg, #3b82f6, #60a5fa)';
            remainingTimeMs = totalAnswerTimeLimitMs;

            const intervalStep = 50; 
            answerTimerInstance = setInterval(() => {
                remainingTimeMs -= intervalStep;
                elapsedQuestionTimeMs += intervalStep;
                
                let percentage = (remainingTimeMs / totalAnswerTimeLimitMs) * 100;
                bar.style.width = `${percentage}%`;

                if (elapsedQuestionTimeMs > fixedSpeedBonusLimitMs) {
                    bar.style.background = 'linear-gradient(90deg, #f59e0b, #eab308)';
                }

                if (remainingTimeMs <= 0) {
                    clearInterval(answerTimerInstance);
                    handleTimeout();
                }
            }, intervalStep);
        }

        function handleSelection(e) {
            if (hasAnswered) return;
            
            const selectedCard = e.currentTarget;
            const isCorrect = selectedCard.dataset.correct === "true";
            clearInterval(answerTimerInstance);
            hasAnswered = true;

            const banner = document.getElementById('feedback-banner');

            if (isCorrect) {
                selectedCard.classList.add('correct');
                
                playSynthSound(587.33, 'triangle', 0.15); 
                setTimeout(() => playSynthSound(880, 'triangle', 0.25), 120); 

                let addedPoints = 2;
                let feedbackHtml = `<span class="text-correct">Correct! +2 Points</span>`;

                if (elapsedQuestionTimeMs <= fixedSpeedBonusLimitMs) {
                    addedPoints += 2;
                    feedbackHtml += `<span class="text-bonus">⚡ Speed Bonus! +2 Extra Points ⚡</span>`;
                    setTimeout(() => playSynthSound(1174.66, 'sine', 0.3), 240); 
                }

                currentScore += addedPoints;
                banner.innerHTML = feedbackHtml;

            } else {
                selectedCard.classList.add('wrong');
                playSynthSound(130.81, 'sawtooth', 0.35); 
                currentScore = Math.max(0, currentScore - 1); 
                banner.innerHTML = `<span class="text-wrong">Wrong Answer -1 Point</span>`;
                
                revealCorrectOption();
            }

            updateScoreboardView();
            document.getElementById('next-btn').style.display = 'inline-flex';
        }

        function handleTimeout() {
            hasAnswered = true;
            playSynthSound(110, 'sawtooth', 0.4);
            currentScore = Math.max(0, currentScore - 1);
            document.getElementById('feedback-banner').innerHTML = `<span class="text-wrong">Time's Up! -1 Point</span>`;
            revealCorrectOption();
            updateScoreboardView();
            document.getElementById('next-btn').style.display = 'inline-flex';
        }

        function revealCorrectOption() {
            const cards = document.querySelectorAll('.option-card');
            cards.forEach(c => {
                if(c.dataset.correct === "true") c.classList.add('correct');
            });
        }

        function nextQuestion() {
            currentIndex++;
            if (currentIndex < currentQuestions.length) {
                loadQuestion();
            } else {
                showEndScreen();
            }
        }

        function updateScoreboardView() {
            document.getElementById('score-display').innerText = `Score: ${currentScore}`;
        }

        function showEndScreen() {
            stopBackgroundAudio();
            document.getElementById('play-screen').classList.remove('active');
            document.getElementById('end-screen').classList.add('active');
            document.getElementById('final-score').innerText = `${currentScore} Points`;

            const msgEl = document.getElementById('motivational-msg');
            if (currentScore >= 28) {
                msgEl.innerText = "Amazing Job! 🏆🌟";
            } else if (currentScore >= 16) {
                msgEl.innerText = "Great work! 👍🎉";
            } else {
                msgEl.innerText = "Keep Practicing! 💪📖";
            }
        }

        function resetGame() {
            clearInterval(answerTimerInstance);
            initGame();
        }

        function toggleMute() {
            isMuted = !isMuted;
            const btn = document.getElementById('mute-btn');
            btn.innerText = isMuted ? "🔇 Muted" : "🔊 Sound";
            btn.classList.toggle('active', isMuted);
            
            if (bgAudioElement) {
                bgAudioElement.muted = isMuted;
            }
        }

        function toggleFullscreen() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen().catch(err => {
                    alert(`Error attempting to enable full-screen mode: ${err.message}`);
                });
            } else {
                document.exitFullscreen();
            }
        }

        /* --- BACKGROUND LOOP SYSTEM --- */
        function startBackgroundAudio() {
            if (bgAudioElement) return;
            try {
                bgAudioElement = new Audio("mixkit-fun-and-games-6.mp3");
                bgAudioElement.loop = true;
                bgAudioElement.volume = 0.08; 
                bgAudioElement.muted = isMuted;
                
                let playPromise = bgAudioElement.play();
                if (playPromise !== undefined) {
                    playPromise.catch(error => {
                        console.log("Audio interaction triggered safeguard:", error);
                    });
                }
            } catch (e) {
                console.log("Audio background initialization warning:", e);
            }
        }

        function stopBackgroundAudio() {
            if (bgAudioElement) {
                try {
                    bgAudioElement.pause();
                    bgAudioElement.currentTime = 0;
                } catch(e){}
                bgAudioElement = null;
            }
        }

        /* --- AUDIO SYNTH NOTIFICATIONS --- */
        function playSynthSound(frequency, type, duration) {
            if (isMuted || !audioCtx) return;
            try {
                let osc = audioCtx.createOscillator();
                let gainNode = audioCtx.createGain();

                osc.type = type;
                osc.frequency.value = frequency;

                gainNode.gain.setValueAtTime(0.3, audioCtx.currentTime);
                gainNode.gain.exponentialRampToValueAtTime(0.00001, audioCtx.currentTime + duration);

                osc.connect(gainNode);
                gainNode.connect(audioCtx.destination);

                osc.start();
                osc.stop(audioCtx.currentTime + duration);
            } catch (e) {
                console.log("Audio trigger alert warning:", e);
            }
        }
    </script>
</body>
